{% extends 'base.html' %}

{% block content %}
<div class="chat-box" id="chat-box">
    {% for message in messages %}
    <div class="{{ message.class }}">
        {{ message.text|safe }}
    </div>
    {% endfor %}
</div>

<form method="POST" action="/" id="chat-form">
    <div class="input-box">
        <textarea name="user_message" id="user-input" placeholder="질문을 입력하세요..." required autofocus></textarea>
        <button type="submit">전송</button>
    </div>
</form>

<form method="POST" action="/clear">
    <button type="submit" class="clear-button">대화 기록 삭제</button>
</form>

<script src="{{ url_for('static', filename='main.js') }}"></script>
{% endblock %}
